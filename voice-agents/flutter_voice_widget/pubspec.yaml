name: atoms_voice_widget
description: "Drop-in voice-agent widget for a Flutter host app over the Smallest Atoms WebSocket."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.2
  record:             ^6.1.0
  flutter_pcm_sound:  ^3.3.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
